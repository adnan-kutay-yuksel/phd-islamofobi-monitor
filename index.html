<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İslamofobi Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui; background: #0f0f0f; color: #e0e0e0; padding: 24px; }
  h1 { color: #fff; margin-bottom: 8px; }
  .stats { display: flex; gap: 16px; margin: 24px 0; flex-wrap: wrap; }
  .stat { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px 24px; }
  .stat-num { font-size: 2em; font-weight: bold; color: #e05252; }
  .stat-label { font-size: 0.85em; color: #888; margin-top: 4px; }
  .cards { display: grid; gap: 12px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .author { color: #5b9bd5; font-weight: 600; }
  .severity { padding: 2px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
  .s1,.s2 { background: #2a2a00; color: #ffcc00; }
  .s3 { background: #2a1a00; color: #ff8800; }
  .s4,.s5 { background: #2a0000; color: #ff4444; }
  .category { font-size: 0.75em; color: #888; margin-bottom: 6px; }
  .content { color: #ccc; line-height: 1.5; }
  .url a { color: #5b9bd5; font-size: 0.8em; text-decoration: none; }
  .engagement { font-size: 0.75em; padding: 2px 6px; border-radius: 4px; background: #222; }
  .viral { color: #ff4444; }
  .high { color: #ff8800; }
  .filters { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  button { background: #222; color: #ccc; border: 1px solid #444; padding: 6px 14px; 
           border-radius: 6px; cursor: pointer; font-size: 0.85em; }
  button.active { background: #e05252; color: white; border-color: #e05252; }
  .timeline { margin-bottom: 24px; }
  #chart { width: 100%; height: 80px; }
  .loading { text-align: center; padding: 40px; color: #666; }
  .timestamp { font-size: 0.75em; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<h1>🔍 İslamofobi Monitor</h1>
<p style="color:#666; margin-top:4px">X (Twitter) gerçek zamanlı nefret söylemi takibi</p>

<div class="stats">
  <div class="stat"><div class="stat-num" id="total">-</div><div class="stat-label">Son 24 saat toplam</div></div>
  <div class="stat"><div class="stat-num" id="viral-count">-</div><div class="stat-label">Viral içerik</div></div>
  <div class="stat"><div class="stat-num" id="high-sev">-</div><div class="stat-label">Yüksek şiddet (4-5)</div></div>
  <div class="stat"><div class="stat-num" id="last-update">-</div><div class="stat-label">Son güncelleme</div></div>
</div>

<div class="filters">
  <button class="active" onclick="filter('all', this)">Tümü</button>
  <button onclick="filter('dehumanization', this)">Dehumanizasyon</button>
  <button onclick="filter('threat_narrative', this)">Tehdit Anlatısı</button>
  <button onclick="filter('crime_association', this)">Suç İlişkilendirme</button>
  <button onclick="filter('replacement_theory', this)">Replacement Theory</button>
  <button onclick="filter('dog_whistle', this)">Dog Whistle</button>
  <button onclick="filter('direct_hatred', this)">Doğrudan Nefret</button>
</div>

<div class="cards" id="cards"><div class="loading">Veriler yükleniyor...</div></div>

<script>
let allData = [];
let currentFilter = 'all';

async function loadData() {
  // data/ klasöründeki son 24 saatlik JSON dosyalarını çek
  // GitHub raw content üzerinden
  const repoBase = window.location.href.includes('github.io') 
    ? '' 
    : 'https://raw.githubusercontent.com/adnan-kutay-yuksel/islamofobi-monitor/master/';
  
  // Son 24 saatin timestamp'lerini üret
  const files = [];
  const now = new Date();
  for (let i = 0; i < 24; i++) {
    const d = new Date(now - i * 3600000);
    const pad = n => String(n).padStart(2,'0');
    const fname = `data/${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}T${pad(d.getUTCHours())}-00-00.json`;
    files.push(fname);
  }

  const results = await Promise.allSettled(
    files.map(f => fetch(repoBase + f).then(r => r.ok ? r.json() : null))
  );

  allData = [];
  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value?.results) {
      allData.push(...r.value.results.map(item => ({
        ...item,
        timestamp: r.value.timestamp
      })));
    }
  });

  updateStats();
  renderCards(allData);
}

function updateStats() {
  document.getElementById('total').textContent = allData.length;
  document.getElementById('viral-count').textContent = 
    allData.filter(d => d.engagement_estimate === 'viral').length;
  document.getElementById('high-sev').textContent = 
    allData.filter(d => d.severity >= 4).length;
  
  if (allData.length > 0) {
    const latest = allData.sort((a,b) => b.timestamp?.localeCompare(a.timestamp))[0];
    document.getElementById('last-update').textContent = 
      latest.timestamp?.replace('T',' ').substring(0,16) + ' UTC' || '-';
  }
}

function renderCards(data) {
  const container = document.getElementById('cards');
  if (data.length === 0) {
    container.innerHTML = '<div class="loading">Bu kategoride veri bulunamadı.</div>';
    return;
  }

  const sorted = [...data].sort((a,b) => (b.severity||0) - (a.severity||0));
  
  container.innerHTML = sorted.map(item => `
    <div class="card">
      <div class="card-header">
        <span class="author">${item.author || 'Bilinmeyen'}</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="engagement ${item.engagement_estimate}">${item.engagement_estimate || ''}</span>
          <span class="severity s${item.severity}">Şiddet: ${item.severity}/5</span>
        </div>
      </div>
      <div class="category">📂 ${item.category || 'kategorisiz'} · 🕐 ${item.timestamp?.substring(0,16).replace('T',' ')} UTC</div>
      <div class="content">${item.content_summary || item.raw || ''}</div>
      ${item.url ? `<div class="url" style="margin-top:8px"><a href="${item.url}" target="_blank">🔗 Posta git</a></div>` : ''}
    </div>
  `).join('');
}

function filter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const filtered = cat === 'all' ? allData : allData.filter(d => d.category === cat);
  renderCards(filtered);
}

loadData();
setInterval(loadData, 300000); // 5 dakikada bir yenile
</script>
</body>
</html>
